name: digest

# Mon & Thu at 06:00 UTC. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * 1,4"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1) this repo (the pipeline)
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install google-genai requests pillow

      # 2) authenticate to Google Cloud (Vertex/Gemini) via a service-account key.
      #    Create the secret GCP_SA_KEY = full JSON of a service account with the
      #    "Vertex AI User" role on your project.
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3) generate today's issue into ./output/<date>/
      - name: Generate digest
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT }}
          GOOGLE_CLOUD_LOCATION: global
        run: python3 daily_arxiv_agent.py --days 7 --top 3

      # 4) check out the Pages repo we publish into.
      #    PAGES_TOKEN = a PAT (or fine-grained token) with write access to
      #    gauravz7/gauravz7.github.io.
      - name: Checkout Pages repo
        uses: actions/checkout@v4
        with:
          repository: gauravz7/gauravz7.github.io
          token: ${{ secrets.PAGES_TOKEN }}
          path: site

      # 5) publish the issue + rebuild the index and RSS feed
      - name: Publish issue + RSS
        run: |
          DATE="$(date -u +%F)"
          python3 publish.py --date "$DATE" --site site \
            --base-url https://gauravz7.github.io/digest

      # 6) commit & push the site (only if something changed)
      - name: Commit & push
        run: |
          cd site
          git config user.name "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add digest
          if git diff --cached --quiet; then
            echo "no changes to publish"
          else
            git commit -m "digest: $(date -u +%F)"
            git push
          fi
